<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>ARUNGI | Login</title>

    <link rel="stylesheet"
          th:href="@{/css/globals.css}">

    <link rel="stylesheet"
          th:href="@{/css/layout.css}">

    <link rel="stylesheet"
          th:href="@{/css/components.css}">

    <link rel="stylesheet"
          th:href="@{/css/auth.css}">

</head>

<body>

<div th:replace="~{fragments/navbar :: navbar}">
</div>

<section class="auth-section">

    <div class="auth-card">

        <h1 class="auth-title">
            Welcome Back
        </h1>

        <p class="auth-subtitle">
            Continue your journey. Continue to Arungi.
        </p>

        <div th:if="${error}" class="error-message">
            <p th:text="${error}"></p>
        </div>

        <div th:if="${success}" class="success-message">
            <p th:text="${success}"></p>
        </div>

        <form class="auth-form"
              th:action="@{/login}"
              method="post">

            <div class="form-group">

                <label>Email</label>

                <input
                        type="email"
                        name="email"
                        class="input-field"
                        placeholder="Enter your email"
                        required>

            </div>

            <div class="form-group">

                <label>Password</label>

                <input
                        type="password"
                        name="password"
                        class="input-field"
                        placeholder="Enter your password"
                        minlength="8"
                        required>

            </div>

            <button
                    type="submit"
                    class="btn-primary auth-btn">

                Login

            </button>

            <p class="auth-footer">

                Don't have an account?

                <a th:href="@{/register}">
                    Register
                </a>

            </p>

        </form>

    </div>

</section>

<div th:replace="~{fragments/footer :: footer}">
</div>

</body>

</html>
