<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>ARUNGI | Profile</title>

    <link rel="stylesheet"
          th:href="@{/css/globals.css}">

    <link rel="stylesheet"
          th:href="@{/css/layout.css}">

    <link rel="stylesheet"
          th:href="@{/css/components.css}">

    <link rel="stylesheet"
          th:href="@{/css/profile.css}">

</head>

<body>

<div th:replace="~{fragments/navbar :: navbar}">
</div>

<section class="profile-section">

    <div class="profile-card">

        <div class="profile-avatar">

            👤

        </div>

        <h1>

            My Profile

        </h1>

        <p class="profile-email"
           th:text="${email}">

        </p>

        <div class="profile-menu">

            <a href="#"
               class="profile-item">

                My Bookings

            </a>

            <a href="#"
               class="profile-item">

                Account Settings

            </a>

            <a th:href="@{/logout}"
               class="profile-item logout">

                Logout

            </a>

        </div>

    </div>

</section>

</body>

</html>
