<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>ARUNGI | Account Settings</title>

    <link rel="stylesheet"
          th:href="@{/css/globals.css}">

    <link rel="stylesheet"
          th:href="@{/css/layout.css}">

    <link rel="stylesheet"
          th:href="@{/css/components.css}">

    <link rel="stylesheet"
          th:href="@{/css/profile.css}">

</head>

<body>

<div th:replace="~{fragments/navbar :: navbar}">
</div>

<section class="profile-section">

    <div class="profile-card">

        <h1>

            Account Settings

        </h1>

        <br>

        <div th:if="${success}"
             style="color:green;
                    font-weight:600;
                    margin-bottom:20px;">

            <span th:text="${success}">
            </span>

        </div>

        <form th:action="@{/profile/settings}"
              method="post">

            <div class="form-group">

                <label>

                    Full Name

                </label>

                <input
                        type="text"
                        class="input-field"
                        value="Nia Anggraini">

            </div>

            <br>

            <div class="form-group">

                <label>

                    Email

                </label>

                <input
                        type="email"
                        class="input-field"
                        th:value="${email}">

            </div>

            <br>

            <div class="form-group">

                <label>

                    New Password

                </label>

                <input
                        type="password"
                        class="input-field">

            </div>

            <br>

            <div class="form-group">

                <label>

                    Confirm Password

                </label>

                <input
                        type="password"
                        class="input-field">

            </div>

            <br>

            <button
                    type="submit"
                    class="btn-primary">

                Save Changes

            </button>

        </form>

    </div>

</section>

</body>

</html>
