<!DOCTYPE html>

<html lang="en"
      xmlns:th="http://www.thymeleaf.org">

<head>

```
<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>ARUNGI | Account Settings</title>

<link rel="stylesheet"
      th:href="@{/css/globals.css}">

<link rel="stylesheet"
      th:href="@{/css/layout.css}">

<link rel="stylesheet"
      th:href="@{/css/components.css}">

<link rel="stylesheet"
      th:href="@{/css/profile.css}">
```

</head>

<body>

<div th:replace="~{fragments/navbar :: navbar}">
</div>

<section class="profile-section">

```
<div class="profile-card">

    <h1>
        Account Settings
    </h1>

    <br>

    <div th:if="${success}"
         style="color:green;
                font-weight:600;
                margin-bottom:20px;">

        <span th:text="${success}">
        </span>

    </div>

    <div th:if="${error}"
         style="color:red;
                font-weight:600;
                margin-bottom:20px;">

        <span th:text="${error}">
        </span>

    </div>

    <form th:action="@{/profile/settings}"
          method="post">

        <div class="form-group">

            <label>
                Full Name
            </label>

            <input
                    type="text"
                    name="fullName"
                    class="input-field"
                    th:value="${fullName}"
                    required>

        </div>

        <br>

        <div class="form-group">

            <label>
                Email
            </label>

            <input
                    type="email"
                    name="email"
                    class="input-field"
                    th:value="${email}"
                    required>

        </div>

        <br>

        <div class="form-group">

            <label>
                New Password
            </label>

            <input
                    type="password"
                    name="password"
                    class="input-field"
                    placeholder="Enter new password">

        </div>

        <br>

        <div class="form-group">

            <label>
                Confirm Password
            </label>

            <input
                    type="password"
                    name="confirmPassword"
                    class="input-field"
                    placeholder="Confirm new password">

        </div>

        <br>

        <button
                type="submit"
                class="btn-primary">

            Save Changes

        </button>

    </form>

</div>
```

</section>

</body>

</html>
