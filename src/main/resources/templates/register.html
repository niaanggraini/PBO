<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>ARUNGI | Register</title>

    <link rel="stylesheet" th:href="@{/css/globals.css}">

    <link rel="stylesheet" th:href="@{/css/layout.css}">

    <link rel="stylesheet" th:href="@{/css/components.css}">

    <link rel="stylesheet" th:href="@{/css/auth.css}">

</head>

<body>

    <div th:replace="~{fragments/navbar :: navbar}">
    </div>

    <section class="auth-section">

        <div class="auth-card">

            <h1 class="auth-title">
                Create Account
            </h1>

            <p class="auth-subtitle">
                Start your journey. Start to Arungi.
            </p>

            <div th:if="${error}" class="error-message">
                <p th:text="${error}"></p>
            </div>

            <div th:if="${success}" class="success-message">
                <p th:text="${success}"></p>
            </div>

            <form class="auth-form" th:action="@{/register}" method="post">

                <div class="form-group">

                    <label>Full Name</label>

                    <input type="text" name="fullName" class="input-field" placeholder="Enter your full name" required>

                </div>

                <div class="form-group">

                    <label>Email</label>

                    <input type="email" name="email" class="input-field" placeholder="Enter your email" required>

                </div>

                <div class="form-group">

                    <label>Password</label>

                    <input type="password" name="password" class="input-field" placeholder="Enter password"
                        minlength="8" required>

                </div>

                <div class="form-group">

                    <label>Confirm Password</label>

                    <input type="password" name="confirmPassword" class="input-field" placeholder="Confirm password"
                        minlength="8" required>

                </div>

                <button type="submit" class="btn-primary auth-btn">

                    Register

                </button>

                <p class="auth-footer">

                    Already have an account?

                    <a th:href="@{/login}">
                        Login
                    </a>

                </p>

            </form>

        </div>

    </section>

    <div th:replace="~{fragments/footer :: footer}">
    </div>

</body>

</html>
