<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>ARUNGI | Packages</title>


    <link rel="stylesheet"
          th:href="@{/css/globals.css}">

    <link rel="stylesheet"
          th:href="@{/css/layout.css}">

    <link rel="stylesheet"
          th:href="@{/css/components.css}">

    <link rel="stylesheet"
          th:href="@{/css/package.css}">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">


</head>

<body>


<!-- NAVBAR -->

<div th:replace="~{fragments/navbar :: navbar}">
</div>



<!-- PAGE HEADER -->

<section class="page-header">

    <div class="container">


        <h1 class="page-title">

            Travel Packages

        </h1>


        <p class="page-subtitle">

            Find the perfect trip across Indonesia and beyond.

        </p>

        <!-- SEARCH SECTION -->
    <div class="search-section">

                <div class="search-wrapper">


                    <div class="search-box">

                        <i class="fa-solid fa-magnifying-glass search-icon">

                        </i>


                        <input

                        type="text"

                        class="search-input"

                        placeholder="Search destination...">


                    </div>




                    <button class="btn-primary">

                        Search

                    </button>



                </div>



    </div>

    

</section>





<!-- PACKAGE SECTION -->

<section class="packages-section">

    <div class="container">


        <div class="packages-layout">



            <!-- FILTER -->

            <aside class="filter-panel">


                <h3 class="filter-title">

                    Filters

                </h3>



                <!-- Destination -->

                <div class="filter-group">

                    <label class="filter-label">

                        Destination

                    </label>


                    <select class="input-field">

                        <option>

                            All Destinations

                        </option>

                        <option>

                            Bali

                        </option>

                        <option>

                            Raja Ampat

                        </option>

                        <option>

                            Lombok

                        </option>

                    </select>

                </div>




                <!-- Duration -->

                <div class="filter-group">

                    <label class="filter-label">

                        Duration

                    </label>


                    <select class="input-field">

                        <option>

                            Any

                        </option>

                        <option>

                            3 Days

                        </option>

                        <option>

                            5 Days

                        </option>

                        <option>

                            7 Days

                        </option>

                    </select>

                </div>




                <!-- Price -->

                <div class="filter-group">

                    <label class="filter-label">

                        Price Range

                    </label>


                    <div class="price-range">

                    <input

                        type="number"

                        class="input-field"

                        placeholder="Min">
                    <input

                        type="number"

                        class="input-field"

                        placeholder="Max">

                </div>

                </div>



            </aside>






            <!-- PACKAGE LIST -->

            <div class="packages-grid">



                <!-- PACKAGE CARD -->

                <div class="package-card"
                th:each="pkg : ${packages}">


                    <div class="package-image">

                        <img
                            th:src="@{/images/{img}(img=${pkg.image})}"
                            alt="Image">

                    </div>

                    <div class="package-content">


                        <span class="package-location">

                            Bali, Indonesia

                        </span>



                        <h3 class="package-title"
                            th:text="${pkg.name}">
                        </h3>



                        <div class="package-meta">


                            <span>

                                🕒 5 Days

                            </span>


                            <span>

                                ⭐ 4.9

                            </span>


                        </div>



                        <div class="package-footer">


                            <div class="package-price">


                                <span>

                                    Start From

                                </span>


                                <strong
                                    th:text="'Rp ' + ${#numbers.formatInteger(pkg.price,0)}">
                                </strong>


                            </div>



                            <a 
                            
                            th:href="@{'/packages/detail/' + ${pkg.id}}"
                            class="btn-primary">

                                View Detail

                            </a>


                        </div>


                    </div>


                </div>




            </div>


        </div>


    </div>

</section>




<!-- FOOTER -->

<div th:replace="~{fragments/footer :: footer}">
</div>


</body>

</html>
