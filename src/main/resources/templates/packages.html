<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>ARUNGI | Packages</title>


    <link rel="stylesheet"
          th:href="@{/css/globals.css}">

    <link rel="stylesheet"
          th:href="@{/css/layout.css}">

    <link rel="stylesheet"
          th:href="@{/css/components.css}">

    <link rel="stylesheet"
          th:href="@{/css/package.css}">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">


</head>

<body>


<!-- NAVBAR -->

<div th:replace="~{fragments/navbar :: navbar}">
</div>



<!-- PAGE HEADER -->

<section class="page-header">

    <div class="container">


        <h1 class="page-title">

            Travel Packages

            <span
                th:if="${selectedDestination != null}"
                th:text="' - ' + ${selectedDestination}">
            </span>

        </h1>


        <p class="page-subtitle">

            Find the perfect trip across Indonesia and beyond.

        </p>

        <!-- SEARCH SECTION -->
    

</section>





<!-- PACKAGE SECTION -->

<section class="packages-section">

    <div class="container">


        <div class="packages-layout">



            <!-- FILTER -->

            <aside class="filter-panel">


                <h3 class="filter-title">
    Filters
</h3>

<form th:action="@{/packages}" method="get">

    <!-- Destination -->

    <div class="filter-group">

        <label class="filter-label">
            Destination
        </label>

        <select
            name="destination"
            class="input-field">

            <option value="">
                All Destinations
            </option>

            <option value="Bali">
                Bali
            </option>

            <option value="Raja Ampat">
                Raja Ampat
            </option>

            <option value="Lombok">
                Lombok
            </option>

            <option value="Labuan Bajo">
                Labuan Bajo
            </option>

        </select>

    </div>

    <!-- Duration -->

    <div class="filter-group">

        <label class="filter-label">
            Duration
        </label>

        <select
            name="duration"
            class="input-field">

            <option value="">
                Any
            </option>

            <option value="3">
                3 Days
            </option>

            <option value="4">
                4 Days
            </option>

            <option value="5">
                5 Days
            </option>

            <option value="7">
                7 Days
            </option>

        </select>

    </div>

    <!-- Price -->

    <div class="filter-group">

        <label class="filter-label">
            Price Range
        </label>

        <div class="price-range">

            <input
                type="number"
                name="minPrice"
                class="input-field"
                placeholder="Min">

            <input
                type="number"
                name="maxPrice"
                class="input-field"
                placeholder="Max">

        </div>

    </div>

    <button
        type="submit"
        class="btn-primary">

        Apply Filter

    </button>

</form>



            </aside>






            <!-- PACKAGE LIST -->

            <div class="packages-grid">



                <!-- PACKAGE CARD -->

                <div class="package-card"
                th:each="pkg : ${packages}">


                    <div class="package-image">

                        <img
                            th:src="@{/images/{img}(img=${pkg.image})}"
                            alt="Image">

                    </div>

                    <div class="package-content">


                        <span class="package-location">

                            Bali, Indonesia

                        </span>



                        <h3 class="package-title"
                            th:text="${pkg.name}">
                        </h3>



                        <div class="package-meta">


                            <span
                                th:text="'🕒 ' + ${pkg.duration} + ' Days'">
                            </span>


                            <span>

                                ⭐ 4.9

                            </span>


                        </div>



                        <div class="package-footer">


                            <div class="package-price">


                                <span>

                                    Start From

                                </span>


                                <strong
                                    th:text="'Rp ' + ${pkg.price}">
                                </strong>


                            </div>



                            <a 
                            
                            th:href="@{'/packages/detail/' + ${pkg.id}}"
                            class="btn-primary">

                                View Detail

                            </a>


                        </div>


                    </div>


                </div>




            </div>


        </div>


    </div>

</section>




<!-- FOOTER -->

<div th:replace="~{fragments/footer :: footer}">
</div>


</body>

</html>
